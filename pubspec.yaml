name: xplore
description: A new Flutter project.
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.1.5 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.17.2
  cupertino_icons: ^1.0.2
  flutter_dotenv: ^5.1.0
  flutter_bloc: ^8.1.3
  freezed_annotation: ^2.4.1
  json_annotation: ^4.6.0
  flutter_svg: ^2.0.9
  firebase_core: ^2.24.2
  google_maps_flutter: ^2.5.3
  geolocator: ^11.0.0
  dotted_border: ^2.1.0
  image_picker: ^1.0.7
  firebase_storage: ^11.6.5
  logger: ^2.2.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_image_compress: ^2.2.0
  hive_generator: ^2.0.1
  uuid: ^4.3.3
  photo_view: ^0.14.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  freezed: ^2.4.6
  build_runner: ^2.4.5
  json_serializable: ^6.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/.env
    - assets/placeholders/
    - assets/icons/
    - assets/demo/
    - assets/maps/
    - assets/illustrations/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
