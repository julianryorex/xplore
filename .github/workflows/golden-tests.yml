name: Golden tests

on:
  pull_request:
    paths:
      - 'lib/**'
      - 'test/**'
      - 'assets/**'
      - 'pubspec.yaml'
  workflow_dispatch:
    inputs:
      update_linux_goldens:
        description: Regenerate Linux golden PNGs and push to the branch
        required: false
        default: false
        type: boolean

jobs:
  golden:
    runs-on: ubuntu-latest
    permissions:
      contents: ${{ github.event_name == 'workflow_dispatch' && inputs.update_linux_goldens && 'write' || 'read' }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.ref }}

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: stable

      - name: Prepare environment
        run: |
          printf 'GEMINI_API_KEY=\nDISABLE_REALTIME_LOCATIONS=true\n' > assets/.env
          flutter pub get
          dart run build_runner build --delete-conflicting-outputs

      - name: Update Linux goldens
        if: github.event_name == 'workflow_dispatch' && inputs.update_linux_goldens
        run: flutter test --update-goldens test/itinerary_card_golden_test.dart

      - name: Commit updated Linux goldens
        if: github.event_name == 'workflow_dispatch' && inputs.update_linux_goldens
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add test/goldens/
          if git diff --staged --quiet; then
            echo "No golden changes to commit."
            exit 0
          fi
          git commit -m "Add Linux golden baselines from CI"
          git push

      - name: Run golden tests
        if: github.event_name != 'workflow_dispatch' || !inputs.update_linux_goldens
        run: flutter test test/itinerary_card_golden_test.dart
