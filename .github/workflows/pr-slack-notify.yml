name: Notify Slack on PR opened

on:
  pull_request:
    types: [opened, ready_for_review]
    branches: [main]

jobs:
  notify:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Post to Slack
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "New PR ready for review: #${{ github.event.pull_request.number }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*<${{ github.event.pull_request.html_url }}|${{ github.event.pull_request.title }}>*\n#${{ github.event.pull_request.number }} by ${{ github.event.pull_request.user.login }}"
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "Repo: `${{ github.repository }}` · Base: `${{ github.event.pull_request.base.ref }}`"
                    }
                  ]
                }
              ]
            }
