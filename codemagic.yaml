# yaml-language-server: $schema=https://codemagic.io/codemagic-schema.json

workflows:
  ios-ci:
    name: iOS CI
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: 3.44.0
      xcode: latest
      cocoapods: default
      vars:
        DISABLE_REALTIME_LOCATIONS: "true"
    cache:
      cache_paths:
        - $HOME/.pub-cache
        - $HOME/Library/Caches/CocoaPods
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: "*"
          include: true
          source: true
      cancel_previous_builds: true
    scripts:
      - name: Verify Flutter toolchain
        script: |
          flutter --version
          dart --version

      - name: Create CI environment file
        script: |
          cat > assets/.env <<EOF
          GEMINI_API_KEY=${GEMINI_API_KEY:-}
          APPLE_API_KEY=${APPLE_API_KEY:-}
          MACOS_API_KEY=${MACOS_API_KEY:-}
          DISABLE_REALTIME_LOCATIONS=${DISABLE_REALTIME_LOCATIONS:-true}
          LOCATION_INTERVAL_UPDATE=${LOCATION_INTERVAL_UPDATE:-}
          EOF

      - name: Install Flutter dependencies
        script: flutter pub get

      - name: Generate Dart sources
        script: dart run build_runner build --delete-conflicting-outputs

      - name: Install iOS pods
        script: |
          cd ios
          pod install

      - name: Build iOS without code signing
        script: flutter build ios --release --no-codesign

      - name: Run iOS CI golden test
        script: flutter test test/itinerary_card_golden_test.dart
    artifacts:
      - build/ios/iphoneos/*.app
      - /tmp/xcodebuild_logs/*.log
      - test/**/failures/**/*.png
