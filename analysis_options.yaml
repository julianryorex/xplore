include: package:flutter_lints/flutter.yaml

linter:

  rules:
    prefer_single_quotes: true # stylistic, developer preference
    cancel_subscriptions: true # adds to resiliency of the system
    always_declare_return_types: true # adds to resiliency of the system
    always_put_required_named_parameters_first: true # stylistic, developer preference
    require_trailing_commas: true # stylistic, developer preference
analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.mocks.dart"
  errors:
    invalid_annotation_target: ignore
